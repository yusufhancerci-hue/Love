<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayşe ❤️</title>

<style>
body{
background:#1a001f;
color:white;
text-align:center;
font-family: 'Segoe UI', sans-serif;
margin-top:100px;
overflow:hidden;
transition:1s;
}

/* romantik ışık efekti */
body::before{
content:"";
position:fixed;
top:-200px;
left:-200px;
width:600px;
height:600px;
background:radial-gradient(circle,#ff4d6d55,transparent 70%);
filter:blur(100px);
z-index:-1;
}

h2{
min-height:80px;
font-weight:500;
}

button{
padding:15px 30px;
font-size:18px;
margin:10px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

#yes{
background:#ff4d6d;
color:white;
box-shadow:0 0 15px #ff4d6d88;
}

#no{
background:#555;
color:white;
position:relative;
}

.heart{
position:fixed;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{top:-10%;}
100%{top:110%;}
}

#countdown{
font-size:60px;
margin-top:20px;
}
</style>
</head>
<body>

<h2 id="question">Ayşe “Gözbebeğim”...<br>Bu kız beni sever mi? 🥺</h2>

<button id="yes">Evet</button>
<button id="no">Hayır</button>

<div id="countdown"></div>

<audio id="music" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9d0a7b2c79.mp3?filename=romantic-piano-110624.mp3" type="audio/mpeg">
</audio>

<script>

let questions = [
"Bu kız beni sever mi? 🥺",
"Bu kız beni affetti mi? 😔",
"Bu kız benim eşim olur mu? 💍",
"Benimle sonsuza kadar kalır mısın? ❤️",
"Artık sen benim Sevgilimsin 😏"
];

let stage = 0;

let question = document.getElementById("question");
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let music = document.getElementById("music");
let countdown = document.getElementById("countdown");

noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);

function moveButton(){
let x = Math.random() * (window.innerWidth - 100);
let y = Math.random() * (window.innerHeight - 50);
noBtn.style.position="absolute";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

yesBtn.addEventListener("click", function(){

// Müzik ilk tıklamada başlasın
if(stage === 0){
music.load();
music.play().catch(()=>{});
}

if(stage < questions.length-1){
stage++;
question.innerHTML="Ayşe “Gözbebeğim”...<br>"+questions[stage];
}
else{
finalScene();
}

});

function finalScene(){
yesBtn.style.display="none";
noBtn.style.display="none";
document.body.style.background="#000";

let count = 3;
countdown.innerHTML = count;

let interval = setInterval(function(){
count--;
if(count > 0){
countdown.innerHTML = count;
}else{
clearInterval(interval);
countdown.innerHTML = "";
question.innerHTML="O zaman artık kaçış yok Gözbebeğim…<br>Sonsuza kadar yanımdasın 😌❤️";
createHearts();
}
},1000);
}

function createHearts(){
for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);
}
}

</script>

</body>
</html>
